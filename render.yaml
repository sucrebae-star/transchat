services:
  - type: web
    name: transchat
    env: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    envVars:
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-5-mini
      - key: OPENAI_TRANSLATION_REASONING_EFFORT
        value: low
      - key: OPENAI_API_KEY
        sync: false
